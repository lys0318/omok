<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Omok</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>OMOK</h1>
            <p class="subtitle">오목 - The Five in a Row</p>
        </header>

        <main>
            <div class="game-info">
                <div class="player black active" id="player-black">
                    <div class="stone-preview black-stone"></div>
                    <span class="player-name">흑돌 (Black)</span>
                </div>
                <div class="status-center">
                    <div class="status-message" id="status-message">흑의 차례입니다</div>
                    <div class="timer-display" id="timer-display">30</div>
                </div>
                <div class="player white" id="player-white">
                    <div class="stone-preview white-stone"></div>
                    <span class="player-name">백돌 (White)</span>
                </div>
            </div>

            <div class="board-container">
                <div id="board" class="board">
                    <!-- Board grid and stones will be generated here -->
                </div>
            </div>

            <div class="controls">
                <button id="reset-btn" class="btn primary">게임 재시작</button>
            </div>
        </main>
    </div>

    <!-- 오버레이들은 body 직계 자식으로 배치 (stacking context 간섭 방지) -->

    <!-- Mode Selection -->
    <div id="mode-overlay">
        <div id="mode-card">
            <h2 class="mode-title">OMOK</h2>
            <p class="mode-subtitle">게임 모드를 선택하세요</p>
            <div class="mode-buttons">
                <button class="mode-btn" onclick="window.omokGame.startGame('pvp')">
                    <span class="mode-icon">👤👤</span>
                    <span class="mode-label">1:1 하기</span>
                    <span class="mode-desc">친구와 대결</span>
                </button>
                <button class="mode-btn" onclick="window.omokGame.startGame('ai')">
                    <span class="mode-icon">🤖</span>
                    <span class="mode-label">혼자하기</span>
                    <span class="mode-desc">AI와 대결</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Win Overlay -->
    <div id="win-overlay" class="overlay hidden">
        <div class="modal">
            <h2 id="win-title">승리!</h2>
            <p id="win-desc">흑돌이 승리했습니다.</p>
            <button id="modal-reset-btn" class="btn primary large">다시 하기</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
